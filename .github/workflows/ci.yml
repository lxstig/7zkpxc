name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full keepassxc dbus-x11

      - name: Build
        run: make build

      - name: Test
        run: make test
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
